[package]
name = "tchat-core"
version = "0.0.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", default-features = false, features = ["napi4"] }
napi-derive = "2"
argon2 = { version = "0.5" }
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand = "0.8"
chacha20poly1305 = "0.10"
base64 = "0.22"
image = "0.25"
viuer = "0.7"
bip39 = "2"
syntect = "5"
sha2 = "0.10"
chrono = "0.4"
urlencoding = "2"
arboard = "3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dirs = "5.0"
totp-rs = { version = "5", features = ["otpauth"] }

[build-dependencies]
napi-build = "2"
