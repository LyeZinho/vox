version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: tchat-db
    environment:
      POSTGRES_USER: tchat_user
      POSTGRES_PASSWORD: tchat_password
      POSTGRES_DB: tchat
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tchat_user -d tchat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tchat-redis
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: tchat-server
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://tchat_user:tchat_password@postgres:5432/tchat
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
